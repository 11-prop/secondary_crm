services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: real_estate_crm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d real_estate_crm"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://crm_user:crm_password@db:5432/real_estate_crm
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

  backup:
    image: postgres:15-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGHOST=db
      - PGPORT=5432
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_password
      - POSTGRES_DB=real_estate_crm
      - BACKUP_SCHEDULE=0 2 * * *
      - BACKUP_RETENTION_DAYS=14
      - TZ=Asia/Karachi
    volumes:
      - ./uploads:/data/uploads:ro
      - ./backups:/backups
      - ./ops/backup:/scripts:ro
    command: ["sh", "/scripts/entrypoint.sh"]

volumes:
  postgres_data:
